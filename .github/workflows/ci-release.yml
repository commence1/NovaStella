name: CI and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          $env:VCPKG_ROOT = Join-Path $env:GITHUB_WORKSPACE 'vcpkg'
          if (-not (Test-Path $env:VCPKG_ROOT)) {
            git clone https://github.com/microsoft/vcpkg.git $env:VCPKG_ROOT
          }
          & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat"

      - name: Configure
        shell: pwsh
        run: |
          $env:VCPKG_ROOT = Join-Path $env:GITHUB_WORKSPACE 'vcpkg'
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release

      - name: Stage files
        shell: pwsh
        run: |
          cmake --install build --prefix dist/windows
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path dist/windows/* -DestinationPath dist/NovaStella-windows.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NovaStella-windows
          path: dist/NovaStella-windows.zip

  build-debian:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm-slim
    steps:
      - name: Install build tools
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            cmake \
            curl \
            git \
            dpkg-dev \
            fakeroot \
            ninja-build \
            python3 \
            tar

      - name: Checkout
        uses: actions/checkout@v4

      - name: Bootstrap vcpkg
        shell: bash
        run: |
          export VCPKG_ROOT="$GITHUB_WORKSPACE/vcpkg"
          if [ ! -d "$VCPKG_ROOT" ]; then
            git clone https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          fi
          "$VCPKG_ROOT/bootstrap-vcpkg.sh"

      - name: Configure
        shell: bash
        run: |
          export VCPKG_ROOT="$GITHUB_WORKSPACE/vcpkg"
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-linux

      - name: Build
        shell: bash
        run: cmake --build build --config Release

      - name: Stage files
        shell: bash
        run: |
          cpack --config build/CPackConfig.cmake -G DEB -B dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NovaStella-debian
          path: dist/*.deb

  release:
    needs:
      - build-windows
      - build-debian
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: NovaStella ${{ github.ref_name }}
          files: release-assets/*